\* Model configuration for MC_SetupRollback
\* Run (safety only):
\*   java -jar ~/workspace/tla2tools.jar -workers auto -config MC_SetupRollback.cfg MC_SetupRollback.tla
\* Run (safety + liveness):
\*   java -jar ~/workspace/tla2tools.jar -workers auto -lncheck final -config MC_SetupRollback.cfg MC_SetupRollback.tla
\* Expected: AgentContained VIOLATED (sudoers installed before pfAnchor).

SPECIFICATION Spec

