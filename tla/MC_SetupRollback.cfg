    MaxSetupAttempts    = 2
    MaxRollbackAttempts = 2

INVARIANTS
    TypeOK
    NoOrphanedArtifacts
    SudoersRequiresHelper
    AgentDepsRequireUser
    AgentContained

PROPERTIES
    CanAlwaysReachClean
