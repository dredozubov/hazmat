\*   java -jar ~/workspace/tla2tools.jar -workers auto -config MC_SeatbeltPolicy.cfg MC_SeatbeltPolicy.tla

SPECIFICATION Spec

CONSTANTS
    normalProj  = normalProj
    agentHome   = agentHome
    configDir   = configDir
    sshDir      = sshDir
    gcloudDir   = gcloudDir
    outsideRef  = outsideRef
    invokerSess = invokerSess

    Paths         = {normalProj, agentHome, configDir, sshDir, gcloudDir, outsideRef, invokerSess}
    CredPaths     = {sshDir, gcloudDir}
    AgentHomeSubs = {configDir}
    ProjectChoices = {normalProj, agentHome, sshDir, configDir}
    ReadChoices    = {normalProj, agentHome, outsideRef}
    ResumeChoices  = {invokerSess, outsideRef, "none"}

INVARIANTS
    TypeOK
    CredentialReadDenied
    CredentialWriteDenied
    ReadDirsNoWrite
    ProjectDirWritable
    ReadDirSubsumption
    ResumeDirNotCredential
