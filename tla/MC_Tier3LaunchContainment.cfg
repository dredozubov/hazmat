\* Model configuration for MC_Tier3LaunchContainment
\*
\* Run:
\*   java -jar ~/workspace/tla2tools.jar -workers auto -config MC_Tier3LaunchContainment.cfg MC_Tier3LaunchContainment.tla

SPECIFICATION Spec

CONSTANTS
    workspaceRoot = workspaceRoot
    projectRoot   = projectRoot
    projectSub    = projectSub
    safeRef       = safeRef
    safeRefChild  = safeRefChild
    invokerHome   = invokerHome
    sshDir        = sshDir
    awsDir        = awsDir

    Paths = {
        workspaceRoot,
        projectRoot,
        projectSub,
        safeRef,
        safeRefChild,
        invokerHome,
        sshDir,
        awsDir
    }

    CredentialLeaves = {sshDir, awsDir}
    ProjectChoices   = {projectRoot, projectSub, invokerHome, sshDir}
    ReadChoices      = {workspaceRoot, projectSub, safeRef, safeRefChild, invokerHome}

INVARIANTS
    TypeOK
    CredentialPathsNeverMounted
    ProjectMountedRW
    PlannedReadDirsMountedRO
    CoveredReadDirsOmitted
    NoUnexpectedLaunchEnv
    BackendValidationBeforeLaunch
    PolicyBeforeLaunch
    ApprovalBeforeLaunch
    PackEnvRejected
    ShellVersionGate
    ExtraWorkspaceVersionGate
