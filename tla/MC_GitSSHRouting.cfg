SPECIFICATION Spec

CONSTANTS
    Hosts        = {h_github, h_prod}
    KeyNames     = {k_1, k_2}
    Sockets      = {s_a, s_b}
    ProfileNames = {p_shared, p_other}
    NoProfile    = no_profile
    NoIdentity   = no_identity
    ExternalIdentity = external_identity
    ProvisionedIdentity = provisioned_identity

INVARIANTS
    TypeOK
    DeterministicRouting
    OverlapRejectedAtConfigTime
    HostsOutsideAllowlistRejected
    InlineKeysHaveDeclaredHosts
    SocketsDistinctForPresent
    NoDanglingProfileRefs
    NoProfileInlineConflict
    PresentKeysHaveIdentity
    IdentitySourceClassified
    NoCrossKey
