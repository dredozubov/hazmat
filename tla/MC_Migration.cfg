SPECIFICATION Spec

\* ── Model values ──────────────────────────────────────────────────────────────
\* Three versions: v0.1.0 (initial release with workspace concept),
\* v0.2.0 (workspace removed, lazy ACL), v0.3.0 (future).

CONSTANTS
    Versions = {"v0.1.0", "v0.2.0", "v0.3.0"}
    VersionOrder = [v \in {"v0.1.0", "v0.2.0", "v0.3.0"} |->
                       IF v = "v0.1.0" THEN 1
                       ELSE IF v = "v0.2.0" THEN 2
                       ELSE 3]
    BinaryVersion = "v0.3.0"

    \* Each version expects a specific set of system artifacts.
    \* v0.1.0: workspace concept (workspace ACL, agent symlink)
    \* v0.2.0: workspace removed, lazy per-project ACL
    \* v0.3.0: adds supply chain hardening (npmrc)
    ExpectedArtifacts = [v \in {"v0.1.0", "v0.2.0", "v0.3.0"} |->
        IF v = "v0.1.0" THEN
            {"agentUser", "devGroup", "workspace", "workspaceACL",
             "agentSymlink", "umask", "seatbelt", "wrappers",
             "launchHelper", "sudoers", "pfAnchor", "dnsBlocklist",
             "launchDaemon", "localRepo", "claudeCode"}
        ELSE IF v = "v0.2.0" THEN
            {"agentUser", "devGroup", "homeDirTraverse",
             "umask", "seatbelt", "wrappers",
             "launchHelper", "sudoers", "pfAnchor", "dnsBlocklist",
             "launchDaemon", "localRepo", "claudeCode"}
        ELSE \* v0.3.0
            {"agentUser", "devGroup", "homeDirTraverse",
             "umask", "seatbelt", "wrappers",
             "launchHelper", "sudoers", "pfAnchor", "dnsBlocklist",
             "launchDaemon", "localRepo", "claudeCode", "npmrc"}
    ]

    \* Migration functions exist for adjacent versions.
    MigrationExists = [p \in ({"v0.1.0", "v0.2.0", "v0.3.0"} \X {"v0.1.0", "v0.2.0", "v0.3.0"}) |->
        IF p = <<"v0.1.0", "v0.2.0">> THEN TRUE
        ELSE IF p = <<"v0.2.0", "v0.3.0">> THEN TRUE
        ELSE FALSE]

\* ── Invariants ────────────────────────────────────────────────────────────────
INVARIANT Safety

\* ── Liveness ──────────────────────────────────────────────────────────────────
PROPERTY EventuallyComplete
