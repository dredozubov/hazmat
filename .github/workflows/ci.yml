name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GO_VERSION_FILE: hazmat/go.mod
  GO_CACHE_DEP: hazmat/go.sum

jobs:
  secret-patterns:
    name: Secret patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reject provider-shaped Google API keys
        run: bash scripts/check-secret-patterns.sh

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: "8.30.0"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan working tree
        run: bash scripts/check-gitleaks.sh detect

  lint:
    name: Lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: ${{ env.GO_CACHE_DEP }}

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: hazmat

  go-test:
    name: Test & vet
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: ${{ env.GO_CACHE_DEP }}

      - name: Vet
        working-directory: hazmat
        run: go vet ./...

      - name: Unit tests
        working-directory: hazmat
        run: go test ./...

      - name: CLI smoke tests
        working-directory: hazmat
        run: bash ../scripts/check-cli-smoke.sh

  linux-compile:
    name: Linux compile-only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: ${{ env.GO_CACHE_DEP }}

      - name: Compile unsupported Linux backend
        run: bash scripts/check-linux-compile.sh

  test-entrypoint-guards:
    name: Test entrypoint guards
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify non-destructive test-entrypoint guards
        run: bash scripts/test-entrypoint-guards.sh

      - name: Verify hostexec absolute-path guard
        run: bash scripts/check-hostexec.sh

  repo-matrix-contract:
    name: Repo matrix contract
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: ${{ env.GO_CACHE_DEP }}

      - name: Build Hazmat
        working-directory: hazmat
        run: make all

      - name: Run required-track contract checks
        run: bash scripts/e2e-stack-matrix.sh --skip-build --contract > stack-matrix-contract.json

      - name: Upload contract artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stack-matrix-contract
          path: stack-matrix-contract.json
          if-no-files-found: ignore

  go-build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          # Linux release artifacts stay disabled until setup/rollback resources
          # are modeled in MC_SetupRollback and implemented.
          - goos: darwin
            goarch: arm64
            cc_arch: arm64
          - goos: darwin
            goarch: amd64
            cc_arch: x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: ${{ env.GO_CACHE_DEP }}

      - name: Build hazmat
        working-directory: hazmat
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: go build -trimpath -o hazmat-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Build hazmat-launch (CGO required for sandbox_init)
        working-directory: hazmat
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
          CC: clang -arch ${{ matrix.cc_arch }}
        run: go build -trimpath -o hazmat-launch-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/hazmat-launch

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: hazmat-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            hazmat/hazmat-${{ matrix.goos }}-${{ matrix.goarch }}
            hazmat/hazmat-launch-${{ matrix.goos }}-${{ matrix.goarch }}

  tla-model-check:
    name: TLA+ model checking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache tla2tools.jar
        id: cache-tla
        uses: actions/cache@v4
        with:
          path: ~/tla2tools.jar
          key: tla2tools-v2026.03.12

      - name: Download TLC
        if: steps.cache-tla.outputs.cache-hit != 'true'
        run: >
          curl -fsSL
          https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar
          -o ~/tla2tools.jar

      - name: Run verified TLA+ suite
        working-directory: tla
        run: TLA2TOOLS_JAR=~/tla2tools.jar bash check_suite.sh

  e2e:
    name: E2E lifecycle
    runs-on: macos-14
    needs: [go-test, linux-compile, go-build, test-entrypoint-guards, repo-matrix-contract]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: ${{ env.GO_CACHE_DEP }}

      - name: E2E lifecycle test
        run: bash scripts/e2e.sh --quick

  e2e-bootstrap:
    name: E2E bootstrap
    runs-on: macos-14
    needs: [go-test, linux-compile, go-build, test-entrypoint-guards, repo-matrix-contract]
    env:
      HOMEBREW_NO_AUTO_UPDATE: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: ${{ env.GO_CACHE_DEP }}

      - name: Install bootstrap toolchains
        run: brew install golangci-lint

      - name: Build Hazmat
        working-directory: hazmat
        run: make all

      - name: Install launch helper
        working-directory: hazmat
        run: sudo make install-helper

      - name: Initialize Hazmat
        run: ./hazmat/hazmat init --yes --bootstrap-agent skip

      - name: Run bootstrap self-hosting checks
        run: bash scripts/e2e-bootstrap.sh --skip-tla | tee e2e-bootstrap.log

      - name: Upload bootstrap artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-bootstrap
          path: e2e-bootstrap.log
          if-no-files-found: ignore

      - name: Roll back Hazmat
        if: always()
        run: ./hazmat/hazmat rollback --delete-user --delete-group --yes || true

  repo-matrix-smoke:
    name: Repo matrix smoke
    if: github.event_name == 'push'
    runs-on: macos-14
    needs: [go-test, linux-compile, go-build, repo-matrix-contract]
    env:
      HOMEBREW_NO_AUTO_UPDATE: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: ${{ env.GO_CACHE_DEP }}

      - name: Install stackcheck toolchains
        run: brew install node pnpm rust uv

      - name: Build Hazmat
        working-directory: hazmat
        run: make all

      - name: Install launch helper
        working-directory: hazmat
        run: sudo make install-helper

      - name: Initialize Hazmat
        run: ./hazmat/hazmat init --yes --bootstrap-agent skip

      - name: Run smoke checks for wave 1
        run: >
          bash scripts/e2e-stack-matrix.sh --skip-build --smoke
          --id next-js
          --id pydantic-ai
          > stack-matrix-smoke.json

      - name: Upload smoke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stack-matrix-smoke
          path: stack-matrix-smoke.json
          if-no-files-found: ignore

      - name: Roll back Hazmat
        if: always()
        run: ./hazmat/hazmat rollback --delete-user --delete-group --yes || true
