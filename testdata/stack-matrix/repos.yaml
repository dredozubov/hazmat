schema_version: 1

repos:
  - id: next-js
    wave: 1
    track: required
    default_check: smoke
    repo: https://github.com/vercel/next.js
    ref: f65b10a54d9abb2ceb3890bcadc22e372f635f88
    stack: node-typescript-rust
    project_subdir: .
    expected_suggestions: [node, rust]
    activate: [node, rust]
    required_formulas: [node, pnpm]
    smoke_commands:
      - node -e 'const pkg = require("./package.json"); if (!Array.isArray(pkg.workspaces) || pkg.workspaces.length === 0) process.exit(1)'
      - pnpm pkg get workspaces >/dev/null
    notes: High-signal mixed Node, TypeScript, and Rust target with nested packages, Rust crates, and .next output.

  - id: pydantic-ai
    wave: 1
    track: required
    default_check: smoke
    repo: https://github.com/pydantic/pydantic-ai
    ref: a282bcade2c2a75847806bbba9cf511dd0623019
    stack: python-uv
    project_subdir: .
    expected_suggestions: [python-uv]
    activate: [python-uv]
    required_formulas: [uv]
    smoke_commands:
      - uv run pytest tests/test_tools.py -q
    notes: Exercises uv workspace detection, VIRTUAL_ENV passthrough, and toolchain traversal.

  - id: poetry
    wave: 1
    track: required
    default_check: smoke
    repo: https://github.com/python-poetry/poetry
    ref: bfce5118814fa95445e823cb07a59bd77ffe1474
    stack: python-poetry
    project_subdir: .
    expected_suggestions: [python-poetry]
    activate: [python-poetry]
    required_formulas: [poetry]
    smoke_commands:
      - poetry run pytest tests -q
    notes: Canonical Poetry target that keeps poetry.lock detection narrow.

  - id: ruff
    wave: 2
    track: required
    default_check: smoke
    repo: https://github.com/astral-sh/ruff
    ref: af9ae49e84daf09f74e654ba3e6d87fe94f6d1ca
    stack: rust
    project_subdir: .
    expected_suggestions: [rust]
    activate: [rust]
    required_formulas: [rust]
    smoke_commands:
      - cargo test -p ruff_python_parser
    notes: Fast Rust regression target for sysroot detection and contained cargo workflows.

  - id: ollama
    wave: 3
    track: informational
    default_check: detect
    repo: https://github.com/ollama/ollama
    ref: 4589fa2cf5afd15fb19aca96c15b5fbf885d11cf
    stack: go
    project_subdir: .
    expected_suggestions: [go]
    activate: [go]
    required_formulas: [go]
    smoke_commands:
      - go test ./...
    notes: Good Go regression target once the fast-path corpus is stable.

  - id: spring-boot
    wave: 3
    track: informational
    default_check: detect
