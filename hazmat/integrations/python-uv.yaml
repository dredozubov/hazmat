integration:
  name: python-uv
  version: 1
  description: Python project with uv

detect:
  files: [uv.lock]

session:
  read_dirs:
    - ~/.local/share/uv
  env_passthrough: [VIRTUAL_ENV]

backup:
  excludes:
    - .venv/
    - __pycache__/
    - .pytest_cache/
    - .mypy_cache/
    - .ruff_cache/
    - "*.pyc"
    - dist/
    - "*.egg-info/"

commands:
  test: uv run pytest
  lint: uv run ruff check .
  format: uv run ruff format .
