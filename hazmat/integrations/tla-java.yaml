integration:
  name: tla-java
  version: 1
  description: Java runtime for TLA+/TLC model checking (macOS Homebrew)

detect:
  files: [MC_SetupRollback.cfg, MC_SeatbeltPolicy.cfg, MC_Migration.cfg, MC_BackupSafety.cfg]

session:
  read_dirs:
    - /opt/homebrew/opt/openjdk
    - /Library/Java
  env_passthrough: [JAVA_HOME]

backup:
  excludes:
    - tla/states/
    - "*.dot"

warnings:
  - "TLC requires tla2tools.jar. See tla/VERIFIED.md for run instructions."
