integration:
  name: tla-java
  version: 1
  description: Java runtime for TLA+/TLC model checking

detect:
  files: ["*.cfg"]

session:
  env_passthrough: [JAVA_HOME, TLA2TOOLS_JAR]
  platforms:
    darwin:
      read_dirs:
        - /opt/homebrew/opt/openjdk
        - /Library/Java

backup:
  excludes:
    - tla/states/
    - "*.dot"

warnings:
  - "TLC requires tla2tools.jar. See tla/VERIFIED.md for run instructions."
