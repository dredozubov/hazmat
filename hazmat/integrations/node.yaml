integration:
  name: node
  version: 1
  description: Node.js project defaults

detect:
  files: [package.json]

session:
  env_passthrough: [NODE_ENV]
  platforms:
    darwin:
      read_dirs:
        - /opt/homebrew/lib/node_modules

backup:
  excludes:
    - node_modules/
    - .next/
    - .turbo/
    - .nuxt/
    - out/
    - .vercel/

commands:
  test: npx vitest
  build: npm run build
  lint: npx eslint .
